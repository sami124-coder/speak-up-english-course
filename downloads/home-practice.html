<!doctype html><html><head><meta charset="utf-8"><title>Family Practice</title><link rel="stylesheet" href="print.css"></head><body><header><h1>15-Day Family Practice Pack</h1><button onclick="print()">Print</button></header><main class="grid" id="cards"></main><script>const tasks=["Ask for help using two classroom phrases.","Interview each other with four questions.","Describe a family member kindly.","Share a favorite thing and explain why.","Tell your routine in order.","Make a home café and order a snack.","Share two abilities and one goal.","Hide a toy and give directions.","Make a tiny shop with prices.","Give one healthy suggestion.","Build a story one sentence at a time.","Solve a problem using English ideas.","Share two opinions politely.","Present a favorite object for one minute.","Hold a mini speaking festival!"];cards.innerHTML=tasks.map((t,i)=>`<article class="card"><b>Day ${i+1}</b><strong>5-minute mission</strong><p>${t}</p></article>`).join("")</script></body></html>
