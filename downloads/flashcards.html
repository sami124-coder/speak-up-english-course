<!doctype html><html><head><meta charset="utf-8"><title>Flashcards</title><link rel="stylesheet" href="print.css"></head><body><header><h1>Speak Up! Vocabulary Flashcards</h1><button onclick="print()">Print</button></header><main class="grid" id="cards"></main><script>const words=["repeat","understand","help","ready","name","hobby","family","creative","because","agree","usually","finally","menu","order","practice","skill","straight","between","price","change","headache","rest","suddenly","ending","idea","improve","opinion","example","present","question","interview","proud"];cards.innerHTML=words.map((w,i)=>`<article class="card"><b>Speak Up!</b><strong>${w}</strong><p>Draw it · Mime it · Say a sentence</p></article>`).join("")</script></body></html>
