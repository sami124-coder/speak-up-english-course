<!doctype html><html><head><meta charset="utf-8"><title>Role-play Cards</title><link rel="stylesheet" href="print.css"></head><body><header><h1>Speak Up! Role-play Cards</h1><button onclick="print()">Print</button></header><main class="grid" id="cards"></main><script>const roles=["Café server: greet, take an order, give the total.","Café customer: order lunch under $10 politely.","Town guide: give four clear direction steps.","Visitor: ask for the library and check one detail.","Shop assistant: explain price, color, and size.","Customer: buy a gift with a $15 budget.","Patient: explain a simple health problem.","Helper: ask questions and give two safe tips.","Host: interview a guest using five questions.","Guest: answer fully and ask one question.","Team leader: invite ideas and give jobs.","Builder: suggest and explain one improvement."];cards.innerHTML=roles.map((r,i)=>`<article class="card"><b>Role ${i+1}</b><strong>Speak together</strong><p>${r}</p></article>`).join("")</script></body></html>
